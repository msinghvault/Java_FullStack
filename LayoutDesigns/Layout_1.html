<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Layout Design1 </title>
    <style>
        #mainPage {
            width: 800px;
            height: 600px;
            border: 2px solid black;
            margin: 10px auto;
        }

        #header {
            width: 700px;
            height: 120px;
            border: 2px solid lightcoral;
            margin: 10px auto;
        }

        #content {
            width: 700px;
            border: 2px solid green;
            height: 300px;
            margin: 10px auto;
        }
        #footer{
            width: 700px;
            height: 110px;
            border: 2px solid red;
            margin: 10px auto;
        }
        #box{
            width: 298px;
            height: 100px;
            border: 2px solid darkblue;
            margin: 20px;
            float: left;
        }
        #contentChild{
            width: 630px;
            height:128px;
            border: 2px solid darkblue;
            margin: auto;
            clear: both;


        }
