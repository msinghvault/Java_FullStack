<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Layout Design1 </title>
    <style>

        #mainPage,
        #content, #header, #footer {
            margin: 10px auto;
        }

        #header, #content, #footer {
            width: 700px;
        }

        #header, #footer {
            height: 120px;
            border: 2px solid red;
        }

        #mainPage {
            width: 800px;
            height: 600px;
            border: 2px solid black;
        }

        #content {
            border: 2px solid green;
            height: 300px;
        }

        .box {
            width: 298px;
            height: 100px;
            border: 2px solid darkblue;
            margin: 20px;
            float: left;
        }

        #contentChild {
            width: 630px;
            height: 128px;
            border: 2px solid darkblue;
            margin: auto;
            clear: both;
        }
    </style>

</head>
<body>
<div id="mainPage">
    <div id="header"></div>
    <div id="content">
        <div class="box"></div>
        <div class="box"></div>
        <div id="contentChild"></div>
    </div>
    <div id="footer"></div>
</div>

</body>
</html>
