<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Float Example</title>

    <style>
        #main {
            background: gray;
        }

        #child1, #child2 {
            height: 150px;
            margin: 10px;
            width: 100px;
        }

        #child1 {
            background: aquamarine;
            float: left;
        }

        #child2 {
            background: lightcoral;
            float: left;
        }
    </style>
</head>
<body>
<div id="main">
    <div id="child1"></div>
    <div id="child2"></div>
</div>
<div id="info">
    <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Illo omnis id
        eaque quas vero quis quasi, dolorum at necessitatibus deserunt repellat
        provident reprehenderit a optio. Enim voluptatibus nam dignissimos
        adipisci.
    </p>
    <h1> This is my Heading</h1>
</div>
</body>
</html>
